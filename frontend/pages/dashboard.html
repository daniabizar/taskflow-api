<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Dashboard</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1>📝 TaskFlow</h1>
            <div class="nav-right">
                <span id="userName">Loading...</span>
                <button onclick="logout()" class="btn btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <div class="dashboard">
        <div id="alert" class="alert" style="display: none;"></div>

        <!-- Statistics Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Tasks</h3>
                <p class="stat-number" id="totalTasks">0</p>
            </div>
            <div class="stat-card">
                <h3>Completed</h3>
                <p class="stat-number" id="completedTasks">0</p>
            </div>
            <div class="stat-card">
                <h3>Pending</h3>
                <p class="stat-number" id="pendingTasks">0</p>
            </div>
            <div class="stat-card">
                <h3>High Priority</h3>
                <p class="stat-number" id="highPriorityTasks">0</p>
            </div>
        </div>

        <!-- Create Task Section -->
        <div class="task-form-card">
            <h2>Create New Task</h2>
            <form id="createTaskForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="title">Task Title</label>
                        <input type="text" id="title" placeholder="Enter task title" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="3" placeholder="Task description (optional)"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="priority">Priority</label>
                        <select id="priority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category">
                            <option value="personal">Personal</option>
                            <option value="work" selected>Work</option>
                            <option value="urgent">Urgent</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="dueDate">Due Date</label>
                        <input type="datetime-local" id="dueDate">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Create Task</button>
            </form>
        </div>

        <!-- Filters -->
        <div class="filters">
            <h2>My Tasks</h2>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
                <button class="filter-btn" data-filter="high">High Priority</button>
            </div>
        </div>

        <!-- Tasks List -->
        <div id="tasksList" class="tasks-list">
            <p class="loading">Loading tasks...</p>
        </div>
    </div>

    <script src="../assets/js/dashboard.js"></script>
</body>
</html>
